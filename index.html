<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bottom Funnel Report — Live</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f2f4f7;
      --line: #141a24;
      --text: #1b2230;
      --muted: #647086;
      --head-yellow: #ead37c;
      --cell: #ffffff;
      --cell-bench: #efe9cb;
      --cell-alt: #f8fafc;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
    }

    .page {
      width: min(1880px, 99vw);
      margin: 10px auto 40px;
      padding: 0 8px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 8px;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 2.8vw, 34px);
      letter-spacing: -0.02em;
    }

    .top-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .date { color: var(--muted); font-size: 13px; }

    .btn {
      padding: 5px 14px;
      border: 2px solid var(--line);
      background: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.15s;
    }
    .btn:hover { background: #f0f0f0; }
    .btn.active { background: var(--head-yellow); }
    .btn-sm {
      padding: 2px 8px;
      font-size: 11px;
      border: 1.5px solid #aaa;
      background: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      cursor: pointer;
      border-radius: 3px;
      white-space: nowrap;
    }
    .btn-sm:hover { background: #e8e8e8; }
    .btn-sm.hide-btn { border-color: #e57373; color: #c62828; }
    .btn-sm.show-btn { border-color: #66bb6a; color: #2e7d32; }
    .btn-sm.edit-btn { border-color: #5c85d6; color: #1a3a7a; }

    .section-title {
      margin: 16px 0 4px;
      font-size: 18px;
      font-weight: 700;
      color: #2a3445;
    }

    .table-wrap {
      border: 2px solid var(--line);
      background: #fff;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1100px;
    }

    th, td {
      border-right: 2px dotted var(--line);
      border-bottom: 2px solid var(--line);
      padding: 5px 6px;
      text-align: center;
      vertical-align: middle;
      line-height: 1.2;
    }

    th:last-child, td:last-child { border-right: none; }

    thead th {
      font-size: 14px;
      font-weight: 700;
      background: var(--head-yellow);
    }
    .sub th { font-size: 12px; }

    tbody td {
      font-size: 13px;
      font-weight: 500;
      background: var(--cell);
    }
    tbody tr.bench-row td { background: var(--cell-bench); }
    tbody tr.data-row td { background: var(--cell-alt); }

    /* Hidden promos — greyed out at bottom in admin mode */
    tr.hidden-bench td, tr.hidden-data td {
      opacity: 0.38;
      background: #e8e8e8 !important;
    }
    tr.hidden-bench td, tr.hidden-data td { color: #777; }
    .hidden-divider td {
      background: #ddd !important;
      font-size: 11px;
      font-weight: 700;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 3px 6px;
      text-align: left;
      border-bottom: 1px solid #bbb;
    }

    .left { text-align: left; }
    td.action-cell, th.action-cell {
      text-align: left;
      min-width: 220px;
      max-width: 320px;
      word-break: break-word;
      border-left: 2px dotted var(--line);
    }
    .hidden-badge {
      display: inline-block;
      background: #ffcccc;
      color: #900;
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 4px;
    }

    .meets { background: #dff1e2 !important; }
    .miss  { background: #f8dfe3 !important; }

    .status-bar {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
      min-height: 18px;
    }
    .status-bar.err { color: #c62828; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #ccc;
      border-top-color: #555;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .new-ads-section { margin-top: 16px; }
    .new-ads-title { font-weight: 700; font-size: 15px; margin-bottom: 6px; }
    .new-ads-list { font-size: 13px; line-height: 1.8; }
    .new-ad-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .new-ad-del {
      background: none;
      border: none;
      color: #c62828;
      font-size: 15px;
      cursor: pointer;
      line-height: 1;
      padding: 0 2px;
      font-family: 'Space Grotesk', sans-serif;
    }
    .new-ad-del:hover { color: #900; }

    /* Admin add-new-ad bar */
    .admin-bar {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      padding: 10px 12px;
      border: 2px solid var(--line);
      background: #fff;
      flex-wrap: wrap;
    }
    .admin-bar.visible { display: flex; }
    .admin-bar label { font-size: 13px; font-weight: 600; }
    .admin-bar input {
      flex: 1;
      min-width: 200px;
      padding: 5px 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      border: 1.5px solid #aaa;
      border-radius: 3px;
    }

    @media (max-width: 1080px) {
      thead th { font-size: 12px; }
      .sub th { font-size: 11px; }
      tbody td { font-size: 12px; }
    }
  </style>
</head>
<body>
<main class="page">
  <div class="top">
    <h1>Bottom Funnel Update</h1>
    <div class="top-right">
      <span class="date" id="today-date"></span>
      <button class="btn" id="refresh-btn" onclick="loadData()">Refresh</button>
      <button class="btn" id="admin-btn" onclick="toggleAdmin()">Admin</button>
    </div>
  </div>

  <div class="status-bar" id="status-bar"></div>

  <div id="report-content"></div>

  <!-- Admin: add new ad bar -->
  <div class="admin-bar" id="admin-bar">
    <label>New Ad:</label>
    <input type="text" id="new-ad-input" placeholder="e.g. Flamborne Fists of Fire — Levels" onkeydown="if(event.key==='Enter')addNewAd()"/>
    <button class="btn" onclick="addNewAd()">Add</button>
    <button class="btn" onclick="toggleColMap()" style="margin-left:auto">Col Map</button>
  </div>
  <!-- Column map debug panel -->
  <div id="col-map-panel" style="display:none;margin:10px 0;border:2px solid #141a24;background:#fff;overflow-x:auto;max-height:420px;overflow-y:auto">
    <table style="width:100%;border-collapse:collapse;font-size:12px;font-family:'Space Grotesk',sans-serif">
      <thead>
        <tr style="background:#ead37c;position:sticky;top:0">
          <th style="padding:4px 8px;border-right:1px solid #ccc;border-bottom:2px solid #141a24">Index</th>
          <th style="padding:4px 8px;border-right:1px solid #ccc;border-bottom:2px solid #141a24">Header</th>
          <th style="padding:4px 8px;border-right:1px solid #ccc;border-bottom:2px solid #141a24">Row 1 (Benchmark)</th>
          <th style="padding:4px 8px;border-bottom:2px solid #141a24">Row 2 (Data)</th>
        </tr>
      </thead>
      <tbody id="col-map-body"></tbody>
    </table>
  </div>
</main>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const SHEET_ID = '1FbP_aQMe37UzHrvPPQSDu3qJoGHzzPENWV66GkzPRZw';
const GID      = '217006698';
const ADMIN_PW = 'PASSWORD';
const STORE_KEY = 'bfu_admin_v1';

// Column indices — built dynamically from sheet header labels (see buildC below).
// Fallback hardcoded values (by column letter) used if label matching fails.
let C = {
  ANGLE:    1,  METRIC:   2,  DATE:     3,  CPI:      4,
  INSTALLS: 5,  SPENT:    6,  ACT_D0:   7,  ACT_D3:   8,
  REC_D7:   13, D3H3:     39, D3H5:     40, D7H5_O:   41,
  D7H10_O:  42, D7H5_SS:  45, D7H10_SS: 46, D3_MAT:   47, D7_MAT: 48,
};

// Column-letter → semantic key (used as fallback when labels are empty)
const LETTER_TO_KEY = {
  B:'ANGLE', C:'METRIC', D:'DATE', E:'CPI', F:'INSTALLS', G:'SPENT',
  H:'ACT_D0', I:'ACT_D3', N:'REC_D7',
  AN:'D3H3', AO:'D3H5', AP:'D7H5_O', AQ:'D7H10_O',
  AT:'D7H5_SS', AU:'D7H10_SS', AV:'D3_MAT', AW:'D7_MAT',
};

// Label patterns — matched against GViz column labels (case-insensitive)
// List order matters: duplicates (D7H5, D7H10) are resolved by first/second occurrence
const LABEL_RULES = [
  { key: 'ANGLE',    test: s => /\bangle\b/i.test(s) },
  { key: 'METRIC',   test: s => /metrics|asset.?code/i.test(s) },
  { key: 'DATE',     test: s => /start.?date/i.test(s) },
  { key: 'CPI',      test: s => /cpi.on.cps/i.test(s) },
  { key: 'INSTALLS', test: s => /^installs$/i.test(s.trim()) },
  { key: 'SPENT',    test: s => /amount.?spent/i.test(s) },
  { key: 'ACT_D0',   test: s => /\bd0\b/i.test(s) },
  { key: 'ACT_D3',   test: s => /activation.*\bd3\b|\bd3\b.*activation/i.test(s) },
  { key: 'REC_D7',   test: s => /recovery.*\bd7\b|\bd7\b.*recovery/i.test(s) },
  { key: 'D3H3',     test: s => /d3h3/i.test(s) },
  { key: 'D3H5',     test: s => /d3h5/i.test(s) },
  { key: 'D7H5_O',   test: s => /overall.*d7h5|d7h5.*overall/i.test(s) },
  { key: 'D7H10_O',  test: s => /overall.*d7h10|d7h10.*overall/i.test(s) },
  { key: 'D7H5_SS',  test: s => /same.?show.*d7h5|d7h5.*same.?show/i.test(s) },
  { key: 'D7H10_SS', test: s => /same.?show.*d7h10|d7h10.*same.?show/i.test(s) },
  { key: 'D3_MAT',   test: s => /d3.?mature/i.test(s) },
  { key: 'D7_MAT',   test: s => /d7.?mature/i.test(s) },
];

function buildC(cols) {
  const result = {};
  // 1. Try matching by column label text
  const assigned = new Set();
  for (const rule of LABEL_RULES) {
    for (let i = 0; i < cols.length; i++) {
      if (assigned.has(i)) continue;
      const label = (cols[i].label || '').trim();
      if (label && rule.test(label)) {
        result[rule.key] = i;
        assigned.add(i);
        break;
      }
    }
  }
  // 2. Fill gaps using column letter (c.id) for any keys not yet found
  for (const [letter, key] of Object.entries(LETTER_TO_KEY)) {
    if (result[key] == null) {
      const idx = cols.findIndex(c => c.id === letter);
      if (idx !== -1) result[key] = idx;
    }
  }
  console.log('Column map:', result);
  return Object.keys(result).length > 5 ? result : C; // safety: keep fallback if almost nothing matched
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let adminMode  = false;
let promoData  = { d7: [], d3: [], d0: [] };

// ── ADMIN STORAGE ─────────────────────────────────────────────────────────────
function getStore() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
  catch { return {}; }
}
function saveStore(s) { localStorage.setItem(STORE_KEY, JSON.stringify(s)); }
function getActions()  { return getStore().actions  || {}; }
function getHidden()   { return getStore().hidden   || []; }
function getNewAds()   { return getStore().newAds   || []; }

function setActions(v)  { const s = getStore(); s.actions = v;  saveStore(s); }
function setHidden(v)   { const s = getStore(); s.hidden  = v;  saveStore(s); }
function setNewAds(v)   { const s = getStore(); s.newAds  = v;  saveStore(s); }

// ── NEW ADS EXPIRY ────────────────────────────────────────────────────────────
// An ad expires at 11:00 AM IST on the day following creation
function isExpired(ad) {
  const IST_OFFSET = 5.5 * 60 * 60 * 1000;
  const now = Date.now();
  const createdIST = ad.ts + IST_OFFSET; // ms since epoch, shifted to IST
  // midnight IST of creation day
  const dayStartIST = Math.floor(createdIST / 86400000) * 86400000;
  // 11 AM IST next day = dayStart + 24h + 11h, converted back to UTC
  const expiryUTC = dayStartIST + (24 + 11) * 3600000 - IST_OFFSET;
  return now >= expiryUTC;
}

function cleanExpiredAds() {
  const fresh = getNewAds().filter(a => !isExpired(a));
  setNewAds(fresh);
  return fresh;
}

// ── JSONP LOADER ──────────────────────────────────────────────────────────────
// Uses a <script> tag so it works from file:// (no CORS/fetch restrictions)
function fetchGvizJSONP() {
  return new Promise((resolve, reject) => {
    const cb = '__gviz_' + Date.now();
    const script = document.createElement('script');
    script.onerror = () => {
      delete window[cb];
      document.head.removeChild(script);
      reject(new Error('Script load failed — check network or sheet visibility'));
    };
    window[cb] = function(data) {
      delete window[cb];
      document.head.removeChild(script);
      if (!data || !data.table) { reject(new Error('Empty response from Google Sheets')); return; }
      resolve(gvizToRows(data));
    };
    // headers=2: treat first 2 sheet rows as column labels (picks up sub-headers like D3H3, D7H5, etc.)
    script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${cb}&gid=${GID}&headers=2`;
    document.head.appendChild(script);
  });
}

// Convert GViz table object → 2-D array of strings (same shape as CSV rows)
let _debugRows = []; // stored for admin column-map panel

function gvizToRows(data) {
  const cols = data.table.cols;
  // Build column index map from header labels (+ letter fallback)
  C = buildC(cols);
  const rows = [];
  const headers = cols.map(c => c.label || c.id || '');
  rows.push(headers);
  for (const row of (data.table.rows || [])) {
    const cells = (row.c || []).map(cell => {
      if (!cell) return '';
      if (cell.f != null) return String(cell.f);
      if (cell.v != null) return String(cell.v);
      return '';
    });
    rows.push(cells);
  }
  _debugRows = rows;
  return rows;
}

// ── PROMO BUILDER ─────────────────────────────────────────────────────────────
function buildPromos(rows) {
  // rows[0] = header — skip
  const promos = [];
  let curAngle = '', curBench = null;

  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    const angle  = (r[C.ANGLE]  || '').trim();
    const metric = (r[C.METRIC] || '').trim();

    if (!metric || metric === '#N/A') continue;

    // Update current angle if the row carries one
    if (angle && angle !== '#N/A') curAngle = angle;

    if (metric.toLowerCase() === 'benchmark') {
      curBench = r;
    } else {
      promos.push({ angle: curAngle, bench: curBench, data: r, assetCode: metric });
      curBench = null;
    }
  }
  return promos;
}

function daysSinceStart(dateStr) {
  if (!dateStr || dateStr === '#N/A' || !dateStr.trim()) return null;
  const parts = dateStr.trim().split('/');
  if (parts.length !== 3) return null;
  const [m, d, y] = parts.map(Number);
  const start = new Date(y, m - 1, d);
  const today = new Date(); today.setHours(0, 0, 0, 0);
  return Math.floor((today - start) / 86400000);
}

function categorize(promos) {
  const d7 = [], d3 = [], d0 = [];
  for (const p of promos) {
    const days = daysSinceStart(p.data[C.DATE]);
    const d3m  = parseVal(p.data[C.D3_MAT]);
    if (days !== null && days > 12) d7.push(p);
    else if (d3m !== null && d3m >= 30) d3.push(p);
    else d0.push(p);
  }
  const byAngle = (a, b) => a.angle.localeCompare(b.angle);
  d7.sort(byAngle); d3.sort(byAngle); d0.sort(byAngle);
  return { d7, d3, d0 };
}

// ── VALUE HELPERS ─────────────────────────────────────────────────────────────
function parseVal(s) {
  if (!s || s === '#N/A' || s.trim() === '') return null;
  const clean = s.trim().replace(/,/g, '');
  if (clean.endsWith('%')) {
    const n = parseFloat(clean);
    return isNaN(n) ? null : n / 100;
  }
  if (clean.startsWith('$')) {
    const n = parseFloat(clean.slice(1));
    return isNaN(n) ? null : n;
  }
  const n = parseFloat(clean);
  return isNaN(n) ? null : n;
}

function fmt(s) {
  if (!s || s === '#N/A' || s.trim() === '') return '—';
  return s.trim();
}

function cc(valS, benchS) {
  // color class: compare actual vs benchmark
  const a = parseVal(valS);
  const b = parseVal(benchS);
  if (a === null || b === null) return '';
  return a >= b ? 'meets' : 'miss';
}

function cell(val, benchVal) {
  const cls = cc(val, benchVal);
  return `<td class="${cls}">${fmt(val)}</td>`;
}

// Fixed-threshold colour coding (e.g. Activation D0: >= 23% green, < 23% red)
function cellT(val, threshold) {
  const a = parseVal(val);
  const cls = a === null ? '' : (a >= threshold ? 'meets' : 'miss');
  return `<td class="${cls}">${fmt(val)}</td>`;
}

// ── ADMIN HELPERS ─────────────────────────────────────────────────────────────
function getAction(assetCode) {
  return getActions()[assetCode] || '';
}
function editAction(assetCode) {
  if (!requireAdmin()) return;
  const cur = getAction(assetCode);
  const val = prompt(`Action / notes for ${assetCode}:`, cur);
  if (val === null) return; // cancelled
  const actions = getActions();
  actions[assetCode] = val;
  setActions(actions);
  render();
}
function toggleHide(assetCode) {
  if (!requireAdmin()) return;
  const hidden = getHidden();
  const idx = hidden.indexOf(assetCode);
  if (idx === -1) hidden.push(assetCode);
  else hidden.splice(idx, 1);
  setHidden(hidden);
  render();
}
function addNewAd() {
  if (!requireAdmin()) return;
  const input = document.getElementById('new-ad-input');
  const text = input.value.trim();
  if (!text) return;
  const ads = getNewAds();
  ads.push({ text, ts: Date.now() });
  setNewAds(ads);
  input.value = '';
  render();
}
function deleteNewAd(idx) {
  if (!requireAdmin()) return;
  const ads = getNewAds();
  ads.splice(idx, 1);
  setNewAds(ads);
  render();
}
function requireAdmin() {
  if (adminMode) return true;
  const pw = prompt('Enter admin password:');
  if (pw === ADMIN_PW) { adminMode = true; updateAdminUI(); return true; }
  alert('Incorrect password.');
  return false;
}

function toggleAdmin() {
  if (!adminMode) {
    const pw = prompt('Enter admin password:');
    if (pw !== ADMIN_PW) { alert('Incorrect password.'); return; }
    adminMode = true;
  } else {
    adminMode = false;
  }
  updateAdminUI();
  render();
}

function updateAdminUI() {
  const btn = document.getElementById('admin-btn');
  const bar = document.getElementById('admin-bar');
  if (adminMode) {
    btn.textContent = 'Admin (on)';
    btn.classList.add('active');
    bar.classList.add('visible');
  } else {
    btn.textContent = 'Admin';
    btn.classList.remove('active');
    bar.classList.remove('visible');
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function actionCell(assetCode, rowspan) {
  const text = getAction(assetCode);
  const rsAttr = rowspan > 1 ? `rowspan="${rowspan}"` : '';
  const editBtn = adminMode
    ? `<button class="btn-sm edit-btn" onclick="editAction('${esc(assetCode)}')">Edit</button> `
    : '';
  const hideBtn = adminMode
    ? `<button class="btn-sm ${getHidden().includes(assetCode) ? 'show-btn' : 'hide-btn'}" onclick="toggleHide('${esc(assetCode)}')">${getHidden().includes(assetCode) ? 'Show' : 'Hide'}</button>`
    : '';
  const adminBtns = adminMode ? `<div style="margin-bottom:4px;display:flex;gap:4px;flex-wrap:wrap">${editBtn}${hideBtn}</div>` : '';
  // Render both real newlines and typed \n as <br>
  const htmlText = escHtml(text).replace(/\\n|\n/g, '<br>');
  return `<td class="action-cell left" ${rsAttr}>${adminBtns}${htmlText}</td>`;
}

function esc(s) { return s.replace(/'/g, "\\'"); }
function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function d7Rows(promoList, cls = '') {
  let out = '';
  const bench = cls ? 'hidden-bench' : 'bench-row';
  const data  = cls ? 'hidden-data'  : 'data-row';
  for (const p of promoList) {
    const d = p.data, b = p.bench || [];
    out += `
      <tr class="${bench}">
        <td rowspan="2" class="left">${escHtml(p.angle)}</td>
        <td>Benchmark</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td>
        <td>${fmt(b[C.ACT_D3])}</td>
        <td>${fmt(b[C.REC_D7])}</td>
        <td>${fmt(b[C.D3H3])}</td>
        <td>${fmt(b[C.D3H5])}</td>
        <td>${fmt(b[C.D7H5_O])}</td>
        <td>${fmt(b[C.D7H10_O])}</td>
        <td>${fmt(b[C.D7H5_SS])}</td>
        <td>${fmt(b[C.D7H10_SS])}</td>
        ${actionCell(p.assetCode, 2)}
      </tr>
      <tr class="${data}">
        <td>${escHtml(p.assetCode)}</td>
        <td>${fmt(d[C.DATE])}</td>
        <td>${fmt(d[C.CPI])}</td>
        <td>${fmt(d[C.INSTALLS])}</td>
        <td>${fmt(d[C.D3_MAT])}</td>
        <td>${fmt(d[C.D7_MAT])}</td>
        <td>${fmt(d[C.SPENT])}</td>
        ${cellT(d[C.ACT_D0], 0.23)}
        ${cell(d[C.ACT_D3],   b[C.ACT_D3])}
        ${cell(d[C.REC_D7],   b[C.REC_D7])}
        ${cell(d[C.D3H3],     b[C.D3H3])}
        ${cell(d[C.D3H5],     b[C.D3H5])}
        ${cell(d[C.D7H5_O],   b[C.D7H5_O])}
        ${cell(d[C.D7H10_O],  b[C.D7H10_O])}
        ${cell(d[C.D7H5_SS],  b[C.D7H5_SS])}
        ${cell(d[C.D7H10_SS], b[C.D7H10_SS])}
      </tr>`;
  }
  return out;
}

function renderD7(promos) {
  const hidden = getHidden();
  const visible = promos.filter(p => !hidden.includes(p.assetCode));
  const hiddenP = adminMode ? promos.filter(p =>  hidden.includes(p.assetCode)) : [];
  if (!visible.length && !hiddenP.length) return '<p style="color:var(--muted);font-size:13px;padding:8px 0">No D7 Mature promos.</p>';

  const colCount = 18;
  let rows = d7Rows(visible);
  if (hiddenP.length) {
    rows += `<tr class="hidden-divider"><td colspan="${colCount}">Hidden</td></tr>`;
    rows += d7Rows(hiddenP, 'hidden');
  }

  return `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th rowspan="2">Angle</th>
            <th rowspan="2">Metrics / Asset Code</th>
            <th rowspan="2">Start Date</th>
            <th rowspan="2">CPI on CPS</th>
            <th rowspan="2">Installs</th>
            <th rowspan="2">D3 Mature installs</th>
            <th rowspan="2">D7 Mature installs</th>
            <th rowspan="2">Amount spent</th>
            <th colspan="2">Activation</th>
            <th colspan="1">Recovery</th>
            <th colspan="2">Retention (Overall)</th>
            <th colspan="2">Retention (Overall)</th>
            <th colspan="2">Retention (Same Show)</th>
            <th rowspan="2" class="action-cell">Action</th>
          </tr>
          <tr class="sub">
            <th>D0</th><th>D3</th>
            <th>D7</th>
            <th>D3H3</th><th>D3H5</th>
            <th>D7H5</th><th>D7H10</th>
            <th>D7H5</th><th>D7H10</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function d3Rows(promoList, cls = '') {
  let out = '';
  const bench = cls ? 'hidden-bench' : 'bench-row';
  const data  = cls ? 'hidden-data'  : 'data-row';
  for (const p of promoList) {
    const d = p.data, b = p.bench || [];
    out += `
      <tr class="${bench}">
        <td rowspan="2" class="left">${escHtml(p.angle)}</td>
        <td>Benchmark</td><td></td><td></td><td></td><td></td><td></td>
        <td>${fmt(b[C.ACT_D3])}</td>
        <td>${fmt(b[C.D3H5])}</td>
        ${actionCell(p.assetCode, 2)}
      </tr>
      <tr class="${data}">
        <td>${escHtml(p.assetCode)}</td>
        <td>${fmt(d[C.DATE])}</td>
        <td>${fmt(d[C.CPI])}</td>
        <td>${fmt(d[C.INSTALLS])}</td>
        <td>${fmt(d[C.D3_MAT])}</td>
        <td>${fmt(d[C.SPENT])}</td>
        ${cell(d[C.ACT_D3], b[C.ACT_D3])}
        ${cell(d[C.D3H5],   b[C.D3H5])}
      </tr>`;
  }
  return out;
}

function renderD3(promos) {
  const hidden = getHidden();
  const visible = promos.filter(p => !hidden.includes(p.assetCode));
  const hiddenP = adminMode ? promos.filter(p =>  hidden.includes(p.assetCode)) : [];
  if (!visible.length && !hiddenP.length) return '<p style="color:var(--muted);font-size:13px;padding:8px 0">No D3 Mature promos.</p>';

  const colCount = 10;
  let rows = d3Rows(visible);
  if (hiddenP.length) {
    rows += `<tr class="hidden-divider"><td colspan="${colCount}">Hidden</td></tr>`;
    rows += d3Rows(hiddenP, 'hidden');
  }

  return `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Angle</th>
            <th>Metrics / Asset Code</th>
            <th>Start Date</th>
            <th>CPI on CPS</th>
            <th>Installs</th>
            <th>D3 Mature installs</th>
            <th>Amount spent</th>
            <th>Activation D3</th>
            <th>D3H5 SS</th>
            <th class="action-cell">Action</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function d0Row(p, hidden = false) {
  const d = p.data, b = p.bench || [];
  const isHid = getHidden().includes(p.assetCode);
  const adminCtrl = adminMode
    ? `<div style="display:flex;gap:4px;margin-bottom:3px">
        <button class="btn-sm edit-btn" onclick="editAction('${esc(p.assetCode)}')">Edit</button>
        <button class="btn-sm ${isHid ? 'show-btn' : 'hide-btn'}" onclick="toggleHide('${esc(p.assetCode)}')">${isHid ? 'Show' : 'Hide'}</button>
       </div>`
    : '';
  const cls = hidden ? 'hidden-data' : 'data-row';
  return `
    <tr class="${cls}">
      <td class="left">${escHtml(p.angle)}</td>
      <td>${escHtml(p.assetCode)}</td>
      <td>${fmt(d[C.DATE])}</td>
      <td>${fmt(d[C.CPI])}</td>
      <td>${fmt(d[C.INSTALLS])}</td>
      <td>${fmt(d[C.SPENT])}</td>
      ${cellT(d[C.ACT_D0], 0.23)}
      <td class="action-cell left">${adminCtrl}${escHtml(getAction(p.assetCode)).replace(/\\n|\n/g,'<br>')}</td>
    </tr>`;
}

function renderD0(promos) {
  const hidden = getHidden();
  const visible = promos.filter(p => !hidden.includes(p.assetCode));
  const hiddenP = adminMode ? promos.filter(p =>  hidden.includes(p.assetCode)) : [];
  if (!visible.length && !hiddenP.length) return '<p style="color:var(--muted);font-size:13px;padding:8px 0">No D0 promos.</p>';

  let rows = visible.map(p => d0Row(p)).join('');
  if (hiddenP.length) {
    rows += `<tr class="hidden-divider"><td colspan="8">Hidden</td></tr>`;
    rows += hiddenP.map(p => d0Row(p, true)).join('');
  }

  return `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Angle</th>
            <th>Metrics / Asset Code</th>
            <th>Start Date</th>
            <th>CPI on CPS</th>
            <th>Installs</th>
            <th>Amount spent</th>
            <th>Activation D0</th>
            <th class="action-cell">Action</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function renderNewAds() {
  const ads = cleanExpiredAds();
  if (!ads.length && !adminMode) return '';
  let items = '';
  for (let i = 0; i < ads.length; i++) {
    const delBtn = adminMode
      ? `<button class="new-ad-del" onclick="deleteNewAd(${i})" title="Remove">&#x2715;</button>`
      : '';
    items += `<div class="new-ad-item">${delBtn}<span>${escHtml(ads[i].text)}</span></div>`;
  }
  if (!items && adminMode) items = '<span style="color:var(--muted);font-size:12px">No entries — add one above.</span>';
  return `
    <div class="new-ads-section">
      <div class="new-ads-title">New Ads uploaded today</div>
      <div class="new-ads-list">${items}</div>
    </div>`;
}

function render() {
  const content = document.getElementById('report-content');
  if (!promoData.d7.length && !promoData.d3.length && !promoData.d0.length) return;

  content.innerHTML = `
    <div class="section-title">D7 Mature Promos</div>
    ${renderD7(promoData.d7)}
    <div class="section-title">D3 Mature Promos</div>
    ${renderD3(promoData.d3)}
    <div class="section-title">D0 Promos</div>
    ${renderD0(promoData.d0)}
    ${renderNewAds()}
  `;
}

// ── DATA LOADING ──────────────────────────────────────────────────────────────
function setStatus(msg, isErr = false) {
  const el = document.getElementById('status-bar');
  el.className = 'status-bar' + (isErr ? ' err' : '');
  el.innerHTML = msg;
}

async function loadData() {
  setStatus('<span class="spinner"></span> Fetching data from Google Sheets…');
  document.getElementById('refresh-btn').disabled = true;
  try {
    const rows = await fetchGvizJSONP();
    if (rows.length < 2) throw new Error('No data rows returned.');
    const promos = buildPromos(rows);
    promoData = categorize(promos);
    const total = promoData.d7.length + promoData.d3.length + promoData.d0.length;
    setStatus(`Loaded ${total} promos — last updated ${new Date().toLocaleTimeString()}`);
    render();
  } catch (e) {
    setStatus(`Failed to load data: ${e.message}. Make sure the Google Sheet is set to "Anyone with the link can view".`, true);
  } finally {
    document.getElementById('refresh-btn').disabled = false;
  }
}

// ── COLUMN MAP DEBUG ──────────────────────────────────────────────────────────
// Currently mapped indices for highlighting in the panel
const MAPPED = new Set(Object.values(C));

function toggleColMap() {
  const panel = document.getElementById('col-map-panel');
  if (panel.style.display !== 'none') { panel.style.display = 'none'; return; }
  const r0 = _debugRows[0] || [];
  const r1 = _debugRows[1] || [];
  const r2 = _debugRows[2] || [];
  const len = Math.max(r0.length, r1.length, r2.length);
  let html = '';
  for (let i = 0; i < len; i++) {
    const h  = r0[i] || '';
    const v1 = r1[i] || '';
    const v2 = r2[i] || '';
    if (!h && !v1 && !v2) continue; // skip fully empty columns
    const hi = MAPPED.has(i) ? 'background:#fff3b0' : '';
    html += `<tr style="${hi}">
      <td style="padding:3px 8px;border-right:1px solid #eee;border-bottom:1px solid #eee;font-weight:700;color:#555">${i}</td>
      <td style="padding:3px 8px;border-right:1px solid #eee;border-bottom:1px solid #eee;color:#888">${escHtml(h)}</td>
      <td style="padding:3px 8px;border-right:1px solid #eee;border-bottom:1px solid #eee">${escHtml(v1)}</td>
      <td style="padding:3px 8px;border-bottom:1px solid #eee">${escHtml(v2)}</td>
    </tr>`;
  }
  document.getElementById('col-map-body').innerHTML = html;
  panel.style.display = 'block';
}

  let changed = false;
  for (const [code, text] of Object.entries(DEFAULT_ACTIONS)) {
    if (!(code in actions)) { actions[code] = text; changed = true; }
  }
  if (changed) setActions(actions);
}
