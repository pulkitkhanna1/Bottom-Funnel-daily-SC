<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bottom Funnel Report — Live</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    :root {
      --bg: #f2f4f7;
      --line: #141a24;
      --text: #1b2230;
      --muted: #647086;
      --head-yellow: #ead37c;
      --cell: #ffffff;
      --cell-bench: #efe9cb;
      --cell-alt: #f8fafc;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
    }

    .page {
      width: min(1880px, 99vw);
      margin: 10px auto 40px;
      padding: 0 8px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 8px;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 2.8vw, 34px);
      letter-spacing: -0.02em;
    }

    .top-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .date { color: var(--muted); font-size: 13px; }

    .btn {
      padding: 5px 14px;
      border: 2px solid var(--line);
      background: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.15s;
    }
    .btn:hover { background: #f0f0f0; }
    .btn.active { background: var(--head-yellow); }
    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }
    .btn-sm {
      padding: 2px 8px;
      font-size: 11px;
      border: 1.5px solid #aaa;
      background: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      cursor: pointer;
      border-radius: 3px;
      white-space: nowrap;
    }
    .btn-sm:hover { background: #e8e8e8; }
    .btn-sm.hide-btn { border-color: #e57373; color: #c62828; }
    .btn-sm.show-btn { border-color: #66bb6a; color: #2e7d32; }
    .btn-sm.edit-btn { border-color: #5c85d6; color: #1a3a7a; }
    .action-textarea {
      width: 100%;
      min-height: 60px;
      font-size: 12px;
      font-family: inherit;
      border: 1px solid #ccc;
      border-radius: 3px;
      padding: 4px 6px;
      resize: vertical;
      box-sizing: border-box;
    }
    .action-textarea:focus { outline: none; border-color: #5c85d6; }

    .section-title {
      margin: 16px 0 4px;
      font-size: 18px;
      font-weight: 700;
      color: #2a3445;
    }

    .table-wrap {
      border: 2px solid var(--line);
      background: #fff;
      overflow-x: auto;
    }

    .extended-wrap table {
      min-width: 1600px;
    }

    .extended-wrap th,
    .extended-wrap td {
      min-width: 95px;
      max-width: 240px;
      word-break: break-word;
    }

    .extended-wrap th:first-child,
    .extended-wrap td:first-child {
      position: sticky;
      left: 0;
      z-index: 2;
      min-width: 58px;
    }

    .extended-wrap th:first-child {
      z-index: 3;
    }

    .extended-wrap td:first-child {
      background: var(--cell-alt);
      font-weight: 700;
      color: var(--muted);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1100px;
    }

    th, td {
      border-right: 2px dotted var(--line);
      border-bottom: 2px solid var(--line);
      padding: 5px 6px;
      text-align: center;
      vertical-align: middle;
      line-height: 1.2;
    }

    th:last-child, td:last-child { border-right: none; }

    thead th {
      font-size: 14px;
      font-weight: 700;
      background: var(--head-yellow);
    }
    .sub th { font-size: 12px; }

    tbody td {
      font-size: 13px;
      font-weight: 500;
      background: var(--cell);
    }
    tbody tr.bench-row td { background: var(--cell-bench); }
    tbody tr.data-row td { background: var(--cell-alt); }

    /* Hidden promos — greyed out at bottom in admin mode */
    tr.hidden-bench td, tr.hidden-data td {
      opacity: 0.38;
      background: #e8e8e8 !important;
    }
    tr.hidden-bench td, tr.hidden-data td { color: #777; }
    .hidden-divider td {

      font-size: 11px;

      max-width: 320px;

      border-left: 2px dotted var(--line);

    .hidden-badge {
      display: inline-block;
      background: #ffcccc;
      color: #900;
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 4px;

    .meets { background: #dff1e2 !important; }
    .miss  { background: #f8dfe3 !important; }

    .status-bar {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
      min-height: 18px;
    }
    .status-bar.err { color: #c62828; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #ccc;
      border-top-color: #555;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .new-ads-section { margin-top: 16px; }
    .new-ads-title { font-weight: 700; font-size: 18px; margin-bottom: 6px; color: #2a3445; }
    .new-ads-list { font-size: 13px; line-height: 1.8; }
    .new-ad-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .new-ad-del {
      background: none;
      border: none;
      color: #c62828;
      font-size: 15px;
      cursor: pointer;
      line-height: 1;
      padding: 0 2px;
      font-family: 'Space Grotesk', sans-serif;
    }
    .new-ad-del:hover { color: #900; }

    /* Admin add-new-ad bar */
    .admin-bar {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      padding: 10px 12px;
      border: 2px solid var(--line);
      background: #fff;

    }
    .admin-bar.visible { display: flex; }
    .admin-bar label { font-size: 13px; font-weight: 600; }
    .admin-bar input {
      flex: 1;
      min-width: 200px;
      padding: 5px 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      border: 1.5px solid #aaa;
      border-radius: 3px;
    }

    @media (max-width: 1080px) {
      thead th { font-size: 12px; }
      .sub th { font-size: 11px; }
      tbody td { font-size: 12px; }
    }

    /* ── Add Promo Modal ──────────────────────────────────────────────────── */
    #promo-modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
    }
    .modal-card {
      position: relative;
      background: #fff;
      border: 2px solid var(--line);
      border-radius: 6px;
      padding: 24px;
      width: min(500px, 95vw);
      max-height: 85vh;
      overflow-y: auto;
      z-index: 1;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }
    .modal-header span { font-size: 17px; font-weight: 700; }
    .modal-header button {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: var(--muted);
      line-height: 1;
      padding: 0 4px;
    }
    .form-row {
      display: flex;
      align-items: center;
      margin-bottom: 9px;
      gap: 10px;
    }
    .form-row label {
      width: 175px;
      flex-shrink: 0;
      font-size: 13px;
      font-weight: 600;
    }
    .form-row input {
      flex: 1;
      padding: 5px 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      border: 1.5px solid #aaa;
      border-radius: 3px;
    }
    #sync-indicator {
      position: fixed;
      bottom: 12px;
      left: 14px;
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
      opacity: 0.75;
    }
    #sync-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #aaa;
      flex-shrink: 0;
    }
    #sync-dot.live  { background: #4caf50; }
    #sync-dot.local { background: #aaa; }
    #sync-dot.error { background: #e57373; }

    .form-section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0.06em;
      margin: 14px 0 8px;
      border-bottom: 1px solid #e0e0e0;
      padding-bottom: 4px;
    }

  </style>
</head>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const SHEET_ID = '1FbP_aQMe37UzHrvPPQSDu3qJoGHzzPENWV66GkzPRZw';
const GID      = '217006698';
const ADMIN_PW = 'PASSWORD';
const STORE_KEY = 'bfu_admin_v1';

// Column indices — built dynamically from sheet header labels (see buildC below).
// Fallback hardcoded values (by column letter) used if label matching fails.
let C = {
  ANGLE:    1,  METRIC:   2,  DATE:     3,  TESTING_CPI: 4,  CPI: 5,
  INSTALLS: 6,  SPENT:    7,  ACT_D0:   8,  ACT_D3:      9,
  REC_D7:   14, D3H3:     40, D3H5:     41, D7H5_O:     42,
  D7H10_O:  43, D7H5_SS:  46, D7H10_SS: 47, D3_MAT:     48, D7_MAT: 49,
};

// Column-letter → semantic key (used as fallback when labels are empty)
const LETTER_TO_KEY = {
  B:'ANGLE', C:'METRIC', D:'DATE', E:'TESTING_CPI', F:'CPI', G:'INSTALLS', H:'SPENT',
  I:'ACT_D0', J:'ACT_D3', O:'REC_D7',
  AO:'D3H3', AP:'D3H5', AQ:'D7H5_O', AR:'D7H10_O',
  AU:'D7H5_SS', AV:'D7H10_SS', AW:'D3_MAT', AX:'D7_MAT',
};

// Label patterns — matched against GViz column labels (case-insensitive)
// List order matters: duplicates (D7H5, D7H10) are resolved by first/second occurrence
const LABEL_RULES = [
  { key: 'ANGLE',    test: s => /\bangle\b/i.test(s) },
  { key: 'METRIC',   test: s => /metrics|asset.?code/i.test(s) },
  { key: 'DATE',     test: s => /start.?date|upload.?date/i.test(s) },
  { key: 'TESTING_CPI', test: s => /testing.?cpi/i.test(s) },
  { key: 'CPI',      test: s => /cpi.on.cps/i.test(s) },
  { key: 'INSTALLS', test: s => /^installs$/i.test(s.trim()) },
  { key: 'SPENT',    test: s => /amount.?spent/i.test(s) },
  { key: 'ACT_D0',   test: s => /\bd0\b/i.test(s) },
  { key: 'ACT_D3',   test: s => /activation.*\bd3\b|\bd3\b.*activation/i.test(s) },
  { key: 'REC_D7',   test: s => /recovery.*\bd7\b|\bd7\b.*recovery/i.test(s) },
  { key: 'D3H3',     test: s => /d3h3/i.test(s) },
  { key: 'D3H5',     test: s => /d3h5/i.test(s) },
  { key: 'D7H5_O',   test: s => /overall.*d7h5|d7h5.*overall/i.test(s) },
  { key: 'D7H10_O',  test: s => /overall.*d7h10|d7h10.*overall/i.test(s) },
  { key: 'D7H5_SS',  test: s => /same.?show.*d7h5|d7h5.*same.?show/i.test(s) },
  { key: 'D7H10_SS', test: s => /same.?show.*d7h10|d7h10.*same.?show/i.test(s) },
  { key: 'D3_MAT',   test: s => /d3.?mature/i.test(s) },
  { key: 'D7_MAT',   test: s => /d7.?mature/i.test(s) },
];

function buildC(cols) {
  const result = {};
  // 1. Try matching by column label text
  const assigned = new Set();
  for (const rule of LABEL_RULES) {
    for (let i = 0; i < cols.length; i++) {
      if (assigned.has(i)) continue;
      const label = (cols[i].label || '').trim();
      if (label && rule.test(label)) {
        result[rule.key] = i;
        assigned.add(i);
        break;
      }
    }
  }
  // 2. Fill gaps using column letter (c.id) for any keys not yet found
  for (const [letter, key] of Object.entries(LETTER_TO_KEY)) {
    if (result[key] == null) {
      const idx = cols.findIndex(c => c.id === letter);
      if (idx !== -1) result[key] = idx;
    }
  }
  console.log('Column map:', result);
  return Object.keys(result).length > 5 ? result : C; // safety: keep fallback if almost nothing matched
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let adminMode  = false;
let promoData  = { d7: [], d3: [], d0: [] };
let extendedMetricsVisible = false;

// ── SUPABASE ──────────────────────────────────────────────────────────────────
let _sb      = null;   // Supabase client (null = not configured)
let _sbReady = false;  // true once initial fetch succeeded
let _cache   = {};     // in-memory store; all getters read from here synchronously

const SB_URL = 'https://ktufdpuaoqfueutqvqiw.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0dWZkcHVhb3FmdWV1dHF2cWl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mjc1MTAsImV4cCI6MjA5MjUwMzUxMH0.CUDdBN_0yXb_Z_rpkCCVRoavip0-U7-jdrtjIeejRFk';

function getSbConfig() {
  // Allow URL hash override; fall back to hardcoded constants
  const params = new URLSearchParams(window.location.hash.slice(1));
  const url = params.get('sbUrl') || SB_URL;
  const key = params.get('sbKey') || SB_KEY;
  return (url && key) ? { url, key } : null;
}

function setSyncStatus(state) { // state: 'live' | 'local' | 'error'
  const dot   = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  if (!dot) return;
  dot.className = state;
  label.textContent = state === 'live' ? 'Cloud synced' : state === 'error' ? 'Sync error (local)' : 'Local only';
}

// ── ADMIN STORAGE ─────────────────────────────────────────────────────────────
function getStore() { return _cache; }

function saveStore(s) {
  _cache = s;
  // Always mirror to localStorage as fallback
  try { localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch {}
  // Push to Supabase asynchronously (fire-and-forget)
  if (_sbReady && _sb) {
    _sb.from('admin_store')
      .upsert({ id: 1, data: s, updated_at: new Date().toISOString() }, { onConflict: 'id' })
      .then(({ error }) => {
        if (error) { console.warn('Supabase write failed:', error.message); setSyncStatus('error'); }
        else setSyncStatus('live');
      });
  }
}
function getActions()  { return getStore().actions  || {}; }
function getHidden(scope = 'default') {
  if (scope === 'default') return [...(getStore().hidden || [])];
  return [...((getStore().hiddenBySection || {})[scope] || [])];
}
function getNewAds()   { return getStore().newAds   || []; }
function getQueue()    { return getStore().queue     || []; }
function getCrackedAssets() { return getStore().crackedAssets || []; }

function setActions(v)      { const s = getStore(); s.actions      = v; saveStore(s); }
function setHidden(v, scope = 'default') {
  const s = getStore();
  if (scope === 'default') {
    s.hidden = [...v];
  } else {
    s.hiddenBySection = s.hiddenBySection || {};
    s.hiddenBySection[scope] = [...v];
  }
  saveStore(s);
}
function setNewAds(v)       { const s = getStore(); s.newAds       = v; saveStore(s); }
function setQueue(v)        { const s = getStore(); s.queue        = v; saveStore(s); }
function setCrackedAssets(v) { const s = getStore(); s.crackedAssets = [...v]; saveStore(s); }
function getManualPromos()  { const mp = getStore().manualPromos || {}; return { d7: mp.d7||[], d3: mp.d3||[], d0: mp.d0||[] }; }
function setManualPromos(v) { const s = getStore(); s.manualPromos = v; saveStore(s); }

// Convert a stored manual promo → promo object used by rendering functions
function manualToPromo(m) {
  const pct = v => v !== '' && v != null ? v + '%' : '';
  const d = [];
  d[C.DATE]     = m.date     || '';
  d[C.CPI]      = m.cpi      ? '$' + m.cpi      : '';
  d[C.INSTALLS] = m.installs || '';
  d[C.SPENT]    = m.spent    ? '$' + m.spent     : '';
  d[C.ACT_D0]   = pct(m.actD0);
  d[C.ACT_D3]   = pct(m.actD3);
  d[C.REC_D7]   = pct(m.recD7);
  d[C.D3_MAT]   = m.d3Mat   || '';
  d[C.D7_MAT]   = m.d7Mat   || '';
  d[C.D3H3]     = pct(m.d3h3);
  // D3 bucket: D3H5 slot holds D3H5 SS; D7 bucket: D3H5 slot holds D3H5 Overall
  d[C.D3H5]     = m.bucket === 'd3' ? pct(m.d3h5ss) : pct(m.d3h5);
  d[C.D7H5_O]   = pct(m.d7h5o);
  d[C.D7H10_O]  = pct(m.d7h10o);
  d[C.D7H5_SS]  = pct(m.d7h5ss);
  d[C.D7H10_SS] = pct(m.d7h10ss);
  return { angle: m.angle, assetCode: m.assetCode, data: d, bench: [], _manual: true, _id: m.id, _bucket: m.bucket };
}

// ── MANUAL PROMO MODAL ────────────────────────────────────────────────────────
let _modalBucket = 'd0';

function openAddPromoModal(bucket) {
  if (!requireAdmin()) return;
  _modalBucket = bucket;
  document.getElementById('modal-title').textContent =
    'Add ' + (bucket === 'd7' ? 'D7 Mature' : bucket === 'd3' ? 'D3 Mature' : 'D0') + ' Promo';
  document.getElementById('promo-form').reset();

  // Show/hide rows by bucket
  const show = id => { const el = document.getElementById(id); if (el) el.style.display = ''; };
  const hide  = id => { const el = document.getElementById(id); if (el) el.style.display = 'none'; };

  // sections
  show('pf-sec-d0');    show('pf-sec-d3d7');  show('pf-sec-d7');

  // d0 fields
  bucket === 'd0' ? show('pf-row-actd0') : hide('pf-row-actd0');

  // d3 + d7 fields
  const d3d7 = bucket === 'd3' || bucket === 'd7';
  d3d7 ? show('pf-row-d3mat')  : hide('pf-row-d3mat');
  d3d7 ? show('pf-row-actd3')  : hide('pf-row-actd3');
  bucket === 'd3' ? show('pf-row-d3h5ss') : hide('pf-row-d3h5ss');

  // d7-only fields

// ── NEW ADS EXPIRY ────────────────────────────────────────────────────────────
// An ad expires at 11:00 AM IST on the day following creation
function isExpired(ad) {
  const IST_OFFSET = 5.5 * 60 * 60 * 1000;
  const now = Date.now();
  const createdIST = ad.ts + IST_OFFSET; // ms since epoch, shifted to IST
  // midnight IST of creation day
  const dayStartIST = Math.floor(createdIST / 86400000) * 86400000;
  // 11 AM IST next day = dayStart + 24h + 11h, converted back to UTC
  const expiryUTC = dayStartIST + (24 + 11) * 3600000 - IST_OFFSET;
  return now >= expiryUTC;
}

function cleanExpiredAds() {
  const fresh = getNewAds().filter(a => !isExpired(a));
  setNewAds(fresh);
  return fresh;
}

// ── JSONP LOADER ──────────────────────────────────────────────────────────────
// Uses a <script> tag so it works from file:// (no CORS/fetch restrictions)
function fetchGvizJSONP() {
  return new Promise((resolve, reject) => {
    const cb = '__gviz_' + Date.now();
    const script = document.createElement('script');
    script.onerror = () => {
      delete window[cb];
      document.head.removeChild(script);
      reject(new Error('Script load failed — check network or sheet visibility'));
    };
    window[cb] = function(data) {
      delete window[cb];
      document.head.removeChild(script);
      if (!data || !data.table) { reject(new Error('Empty response from Google Sheets')); return; }
      resolve(gvizToRows(data));
    };
    // headers=2: treat first 2 sheet rows as column labels (picks up sub-headers like D3H3, D7H5, etc.)
    script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${cb}&gid=${GID}&headers=2`;
    document.head.appendChild(script);
  });
}

// Convert GViz table object → 2-D array of strings (same shape as CSV rows)
let _debugRows = []; // stored for admin column-map panel

function gvizToRows(data) {
  const cols = data.table.cols;
  // Build column index map from header labels (+ letter fallback)
  C = buildC(cols);
  const rows = [];
  const headers = cols.map(c => c.label || c.id || '');
  rows.push(headers);
  for (const row of (data.table.rows || [])) {
    const cells = (row.c || []).map(cell => {
      if (!cell) return '';
      if (cell.f != null) return String(cell.f);
      if (cell.v != null) return String(cell.v);
      return '';
    });
    rows.push(cells);
  }
  _debugRows = rows;
  return rows;
}

// ── PROMO BUILDER ─────────────────────────────────────────────────────────────
function buildPromos(rows) {
  // rows[0] = header — skip
  const promos = [];
  let curAngle = '', curBench = null;

  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    const angle  = (r[C.ANGLE]  || '').trim();
    const metric = (r[C.METRIC] || '').trim();

    if (!metric || metric === '#N/A') continue;

    // Update current angle if the row carries one
    if (angle && angle !== '#N/A') curAngle = angle;

    if (metric.toLowerCase() === 'benchmark') {
      curBench = r;
    } else {
      promos.push({ angle: curAngle, bench: curBench, data: r, assetCode: metric });
      curBench = null;
    }
  }
  return promos;
}

function daysSinceStart(dateStr) {
  if (!dateStr || dateStr === '#N/A' || !dateStr.trim()) return null;
  const parts = dateStr.trim().split('/');
  if (parts.length !== 3) return null;
  const [m, d, y] = parts.map(Number);
  const start = new Date(y, m - 1, d);
  const today = new Date(); today.setHours(0, 0, 0, 0);
  return Math.floor((today - start) / 86400000);
}

function categorize(promos) {
  const d7 = [], d3 = [], d0 = [];
  for (const p of promos) {
    const days = daysSinceStart(p.data[C.DATE]);
    const d3m  = parseVal(p.data[C.D3_MAT]);
    if (days !== null && days > 12) d7.push(p);
    else if (d3m !== null && d3m >= 30) d3.push(p);
    else d0.push(p);
  }
  const byAngle = (a, b) => a.angle.localeCompare(b.angle);
  d7.sort(byAngle); d3.sort(byAngle); d0.sort(byAngle);
  return { d7, d3, d0 };
}

// ── VALUE HELPERS ─────────────────────────────────────────────────────────────
function parseVal(s) {
  if (!s || s === '#N/A' || s.trim() === '') return null;
  const clean = s.trim().replace(/,/g, '');
  if (clean.endsWith('%')) {
    const n = parseFloat(clean);
    return isNaN(n) ? null : n / 100;
  }
  if (clean.startsWith('$')) {
    const n = parseFloat(clean.slice(1));
    return isNaN(n) ? null : n;
  }
  const n = parseFloat(clean);
  return isNaN(n) ? null : n;
}

function fmt(s) {
  if (!s || s === '#N/A' || s.trim() === '') return '—';
  return s.trim();
}

function valueAt(row, key) {
  const idx = C[key];
  return idx == null ? '' : row[idx];
}

function cc(valS, benchS) {
  // color class: compare actual vs benchmark
  const a = parseVal(valS);
  const b = parseVal(benchS);
  if (a === null || b === null) return '';
  return a >= b ? 'meets' : 'miss';
}

function cell(val, benchVal) {
  const cls = cc(val, benchVal);
  return `<td class="${cls}">${fmt(val)}</td>`;
}

// Fixed-threshold colour coding (e.g. Activation D0: >= 23% green, < 23% red)
function cellT(val, threshold) {
  const a = parseVal(val);
  const cls = a === null ? '' : (a >= threshold ? 'meets' : 'miss');
  return `<td class="${cls}">${fmt(val)}</td>`;
}

    const delBtn = adminMode
      ? `<button class="new-ad-del" onclick="deleteQueueItem(${i})" title="Remove">&#x2715;</button>`
      : '';
    items += `<div class="new-ad-item">${delBtn}<span>${escHtml(q[i].text)}</span></div>`;
  }
  if (!items && adminMode) items = '<span style="color:var(--muted);font-size:12px">No entries — add one above.</span>';
  return `
    <div class="new-ads-section">
      <div class="new-ads-title">Queued for CPS upload</div>
      <div class="new-ads-list">${items}</div>
    </div>`;
}

function render() {
  const content = document.getElementById('report-content');
  const mp = getManualPromos();
  const crackedAssetCodes = getCrackedAssets();
  const d7Promos = [...promoData.d7, ...mp.d7.map(manualToPromo)];
  const crackedPromos = d7Promos.filter(p => crackedAssetCodes.includes(p.assetCode));
  const activeD7Promos = d7Promos.filter(p => !crackedAssetCodes.includes(p.assetCode));
  const hasData = crackedPromos.length || activeD7Promos.length || promoData.d3.length || promoData.d0.length
                || mp.d7.length || mp.d3.length || mp.d0.length;
  if (!hasData && !extendedMetricsVisible) return;

  const addBtn = bucket => adminMode
    ? ` <button class="btn-sm edit-btn" style="vertical-align:middle;margin-left:8px" onclick="openAddPromoModal('${bucket}')">+ Add Promo</button>`
    : '';

  content.innerHTML = `
    ${hasData ? `
      <div class="section-title">Cracked Assets</div>
      ${renderD7(crackedPromos, 'No Cracked Assets.', 'Upload Date', 'cracked', 'd7')}
      <div class="section-title">D7 Mature Promos${addBtn('d7')}</div>
      ${renderD7(activeD7Promos, 'No D7 Mature promos.', 'Start Date', 'd7', 'cracked')}
      <div class="section-title">D3 Mature Promos${addBtn('d3')}</div>
      ${renderD3([...promoData.d3, ...mp.d3.map(manualToPromo)])}
      <div class="section-title">D0 Promos${addBtn('d0')}</div>
      ${renderD0([...promoData.d0, ...mp.d0.map(manualToPromo)])}
    ` : ''}
    ${renderExtendedMetrics()}
    ${renderNewAds()}
    ${renderQueue()}
  `;
}

function toggleExtendedMetrics() {
  extendedMetricsVisible = !extendedMetricsVisible;
  updateExtendedMetricsButton();
  render();
}

function updateExtendedMetricsButton() {
  const btn = document.getElementById('extended-metrics-btn');
  if (!btn) return;
  btn.textContent = extendedMetricsVisible ? 'hide extended metrics' : 'show extended metrics';
  btn.classList.toggle('active', extendedMetricsVisible);
}

function renderExtendedMetrics() {
  if (!extendedMetricsVisible) return '';
  if (!_debugRows.length) {
    return '<p style="color:var(--muted);font-size:13px;padding:8px 0">Load the sheet to show extended metrics.</p>';
  }

  const colIndexes = getNonEmptyColumnIndexes(_debugRows);
  const header = _debugRows[0] || [];
  const rows = _debugRows.slice(1).filter(row => colIndexes.some(i => fmt(row[i]) !== '—'));
  const headCells = colIndexes
    .map(i => `<th>${escHtml(header[i] || columnLabel(i))}</th>`)
    .join('');
  const bodyRows = rows.map((row, rowIdx) => `
    <tr>
      <td>${rowIdx + 1}</td>
      ${colIndexes.map(i => `<td>${escHtml(fmt(row[i]))}</td>`).join('')}
    </tr>`).join('');

  return `
    <div class="section-title">Extended Metrics</div>
    <div class="table-wrap extended-wrap">
      <table>
        <thead>
          <tr>
            <th>Row</th>
            ${headCells}
          </tr>
        </thead>
        <tbody>${bodyRows}</tbody>
      </table>
    </div>`;
}

function getNonEmptyColumnIndexes(rows) {
  const maxLen = rows.reduce((max, row) => Math.max(max, row.length), 0);
  const indexes = [];
  for (let i = 0; i < maxLen; i++) {
    if (rows.some(row => row[i] && String(row[i]).trim() && row[i] !== '#N/A')) indexes.push(i);
  }
  return indexes;
}

function columnLabel(index) {
  let n = index + 1;
  let label = '';
  while (n > 0) {
    const rem = (n - 1) % 26;
    label = String.fromCharCode(65 + rem) + label;
    n = Math.floor((n - 1) / 26);
  }
  return label;
}

// ── DATA LOADING ──────────────────────────────────────────────────────────────
function setStatus(msg, isErr = false) {
  const el = document.getElementById('status-bar');
  el.className = 'status-bar' + (isErr ? ' err' : '');
  el.innerHTML = msg;
}

async function downloadPNG() {
  const btn = document.getElementById('download-png-btn');
  const target = document.querySelector('.page');
  if (!target) return;
  if (typeof html2canvas === 'undefined') {
    setStatus('PNG download is still loading. Try again in a moment.', true);
    return;
  }

  const originalText = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Downloading...';
  try {
    const canvas = await html2canvas(target, {
      backgroundColor: '#f2f4f7',
      scale: Math.min(2, window.devicePixelRatio || 1),
      useCORS: true,
      windowWidth: target.scrollWidth,
      windowHeight: target.scrollHeight,
    });
    const link = document.createElement('a');
    const date = new Date().toISOString().slice(0, 10);
    link.download = `bottom-funnel-update-${date}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    setStatus(`Downloaded PNG — ${new Date().toLocaleTimeString()}`);
  } catch (e) {
    setStatus(`Failed to download PNG: ${e.message}`, true);
  } finally {
    btn.disabled = false;
    btn.textContent = originalText;
  }
}

async function loadData() {
  setStatus('<span class="spinner"></span> Fetching data from Google Sheets…');
  document.getElementById('refresh-btn').disabled = true;
  document.getElementById('download-png-btn').disabled = true;
  document.getElementById('extended-metrics-btn').disabled = true;
  try {
    const rows = await fetchGvizJSONP();
    if (rows.length < 2) throw new Error('No data rows returned.');
    const promos = buildPromos(rows);
    promoData = categorize(promos);
    const total = promoData.d7.length + promoData.d3.length + promoData.d0.length;
    setStatus(`Loaded ${total} promos — last updated ${new Date().toLocaleTimeString()}`);
    updateExtendedMetricsButton();
    render();
  } catch (e) {
    setStatus(`Failed to load data: ${e.message}. Make sure the Google Sheet is set to "Anyone with the link can view".`, true);
  } finally {
    document.getElementById('refresh-btn').disabled = false;
    document.getElementById('download-png-btn').disabled = false;
    document.getElementById('extended-metrics-btn').disabled = false;
  }
}

const MAPPED = new Set(Object.values(C));

function toggleColMap() {
  const panel = document.getElementById('col-map-panel');
  if (panel.style.display !== 'none') { panel.style.display = 'none'; return; }
  const r0 = _debugRows[0] || [];
  const r1 = _debugRows[1] || [];
  const r2 = _debugRows[2] || [];
  const len = Math.max(r0.length, r1.length, r2.length);
  let html = '';
  for (let i = 0; i < len; i++) {
    const h  = r0[i] || '';
    const v1 = r1[i] || '';
    const v2 = r2[i] || '';
    if (!h && !v1 && !v2) continue; // skip fully empty columns
    const hi = MAPPED.has(i) ? 'background:#fff3b0' : '';
    html += `<tr style="${hi}">
      <td style="padding:3px 8px;border-right:1px solid #eee;border-bottom:1px solid #eee;font-weight:700;color:#555">${i}</td>
      <td style="padding:3px 8px;border-right:1px solid #eee;border-bottom:1px solid #eee;color:#888">${escHtml(h)}</td>
      <td style="padding:3px 8px;border-right:1px solid #eee;border-bottom:1px solid #eee">${escHtml(v1)}</td>
      <td style="padding:3px 8px;border-bottom:1px solid #eee">${escHtml(v2)}</td>
    </tr>`;
  }
  document.getElementById('col-map-body').innerHTML = html;
  panel.style.display = 'block';
}

  const actions = getActions();
  // Always write defaults so updates here propagate on next page load
  let changed = false;
  for (const [code, text] of Object.entries(DEFAULT_ACTIONS)) {
    if (!(code in actions)) { actions[code] = text; changed = true; }
  }
  if (changed) setActions(actions);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
(async function init() {
  // 1. Hydrate cache from localStorage instantly (no flicker)
  try { _cache = JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch { _cache = {}; }

  // 2. Attempt Supabase connection via URL hash params
  const cfg = getSbConfig();
  if (cfg) {
    try {
      _sb = supabase.createClient(cfg.url, cfg.key);
      const { data, error } = await _sb.from('admin_store').select('data').eq('id', 1).single();
      if (error) throw error;
      _cache = data.data || {};
      try { localStorage.setItem(STORE_KEY, JSON.stringify(_cache)); } catch {}
      _sbReady = true;
      setSyncStatus('live');

      // Realtime: refresh cache + re-render when another user saves
      _sb.channel('admin-sync')
        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'admin_store' },
          payload => {
            _cache = payload.new.data || {};
            try { localStorage.setItem(STORE_KEY, JSON.stringify(_cache)); } catch {}
            render();
          })
        .subscribe();
    } catch (e) {
      console.warn('Supabase unavailable, using localStorage:', e.message);
      setSyncStatus('error');
    }
  }

  // 3. Render
  document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-GB', {
    day: 'numeric', month: 'long', year: 'numeric'
  });
  loadData();
})();
